<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>✓ My To-Do List</h1>
        <p class="subtitle">Stay organized and productive</p>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task..." class="task-input">
            <button onclick="addTask()" class="add-btn">Add +</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completeCount">0</div>
                <div class="stat-label">Complete</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <ul id="taskList" class="task-list">
        </ul>

        <div id="emptyState" class="empty-state" style="display: block;">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">No tasks yet</div>
            <div style="font-size: 0.95em; color: #bdbdbd;">Add a task to get started</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
